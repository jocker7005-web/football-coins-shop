
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Coins Do'koni</title>
    <script <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #ffcc00;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            transform: scale(1.03);
            border-color: #ffcc00;
        }
        .coins {
            font-size: 18px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .price {
            color: #2ea043;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>⚽️ eFootball Coins Do'koni</h1>
    
    <div class="container">
        <div class="card" onclick="buyItem('260 coins', '40 000')">
            <span class="coins">260 coins</span>
            <span class="price">40 000 so'm</span>
        </div>
        <div class="card" onclick="buyItem('300 coins', '45 000')">
            <span class="coins">300 coins</span>
            <span class="price">45 000 so'm</span>
        </div>
        <div class="card" onclick="buyItem('390 coins', '60 000')">
            <span class="coins">390 coins</span>
            <span class="price">60 000 so'm</span>
        </div>
        <div class="card" onclick="buyItem('550 coins', '70 000')">
            <span class="coins">550 coins</span>
            <span class="price">70 000 so'm</span>
        </div>
        <div class="card" onclick="buyItem('750 coins', '95 000')">
            <span class="coins">750 coins</span>
            <span class="price">95 000 so'm</span>
        </div>
        <div class="card" onclick="buyItem('1040 coins', '125 000')">
            <span class="coins">1040 coins</span>
            <span class="price">125 000 so'm</span>
        </div>
        <div class="card" onclick="buyItem('1790 coins', '210 000')">
            <span class="coins">1790 coins</span>
            <span class="price">210 000 so'm</span>
        </div>
        <div class="card" onclick="buyItem('2130 coins', '240 000')">
            <span class="coins">2130 coins</span>
            <span class="price">240 000 so'm</span>
        </div>
    </div>

    <script>
        // Telegram Web App ob'ektini ishga tushiramiz
        const tg = window.Telegram.WebApp;
        tg.ready(); // Telegramga tayyorligimizni bildiramiz

        function buyItem(item, price) {
            // Botga yuboriladigan ma'lumotlar tuzilmasi
            const data = {
                item: item,
                price: price
            };
            
            // Ma'lumotni matn (string) ko'rinishida botga uzatamiz
            tg.sendData(JSON.stringify(data));
            
            // Oynani avtomat yopamiz
            tg.close();
        }
    </script><script>
    // Telegram WebApp-ni ishga tushiramiz
    const tg = window.Telegram.WebApp;
    tg.ready(); // Telegramga tayyorligimizni bildiramiz

    function sendCoins(itemName, itemPrice) {
        const data = {
            item: itemName,
            price: itemPrice
        };
        // Ma'lumotni botga jo'natish
        tg.sendData(JSON.stringify(data));

        // Do'kon oynasini avtomat yopish
        tg.close();
    }
</script>
</body>
</html>
