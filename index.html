
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Coins Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #ffdf00;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .coins {
            font-size: 18px;
            font-weight: bold;
            color: #58a6ff;
            margin-bottom: 5px;
        }
        .price {
            font-size: 14px;
            color: #2ea44f;
            margin-bottom: 12px;
        }
        .btn-buy {
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-buy:hover {
            background-color: #2ea44f;
        }
    </style>
</head>
<body>

    <h1>⚽ Android uchun Coins do'koni</h1>

    <div class="container">
        <div class="card">
            <div class="coins">260 coins</div>
            <div class="price">40 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '260 coins', '40 000')">Sotib olish</button>
        </div>

        <div class="card">
            <div class="coins">300 coins</div>
            <div class="price">45 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '300 coins', '45 000')">Sotib olish</button>
        </div>

        <div class="card">
            <div class="coins">390 coins</div>
            <div class="price">60 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '390 coins', '60 000')">Sotib olish</button>
        </div>

        <div class="card">
            <div class="coins">550 coins</div>
            <div class="price">70 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '550 coins', '70 000')">Sotib olish</button>
        </div>

        <div class="card">
            <div class="coins">750 coins</div>
            <div class="price">95 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '750 coins', '95 000')">Sotib olish</button>
        </div>

        <div class="card">
            <div class="coins">1040 coins</div>
            <div class="price">125 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '1040 coins', '125 000')">Sotib olish</button>
        </div>

        <div class="card">
            <div class="coins">1790 coins</div>
            <div class="price">210 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '1790 coins', '210 000')">Sotib olish</button>
        </div>

        <div class="card">
            <div class="coins">2130 coins</div>
            <div class="price">240 000 so'm</div>
            <button class="btn-buy" onclick="sendOrder('Android', '2130 coins', '240 000')">Sotib olish</button>
        </div>
    </div>

    <script>
        // Telegram WebApp dasturini ishga tushirish
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Oynani to'liq ekranda ochish

        function sendOrder(platform, item, price) {
            // Botga yuboriladigan ma'lumotlar to'plami
            const orderData = {
                platform: platform,
                item: item,
                price: price
            };
            
            // Ma'lumotni botga uzatish va WebApp oynasini yopish
            tg.sendData(JSON.stringify(orderData));
        }
    </script>
</body>
</html>
