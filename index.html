
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Coins Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        h2 { color: #f0a; }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        .btn {
            background-color: #222;
            border: 2px solid #333;
            color: white;
            padding: 20px 10px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            border-color: #f0a;
            background-color: #1a1a1a;
        }
        .price {
            display: block;
            color: #4caf50;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h2>⚽️ eFootball Coins Shop 🪙</h2>
    <p>Sotib olmoqchi bo'lgan tanga miqdorini tanlang:</p>

    <div class="container">
        <button class="btn" onclick="sendCoins('1000 Coins', '15000')">🪙 1,000<span class="price">15,000 so'm</span></button>
        <button class="btn" onclick="sendCoins('2000 Coins', '28000')">🪙 2,000<span class="price">28,000 so'm</span></button>
        <button class="btn" onclick="sendCoins('3000 Coins', '40000')">🪙 3,000<span class="price">40,000 so'm</span></button>
        <button class="btn" onclick="sendCoins('5000 Coins', '65000')">🪙 5,000<span class="price">65,000 so'm</span></button>
        <button class="btn" onclick="sendCoins('10000 Coins', '120000')">🪙 10,000<span class="price">120,000 so'm</span></button>
        <button class="btn" onclick="sendCoins('20000 Coins', '230000')">🪙 20,000<span class="price">230,000 so'm</span></button>
    </div>

    <script>
        // Telegram WebApp interfeysini faollashtirish
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Oynani birdaniga katta ochish

        function sendCoins(name, price) {
            const orderData = {
                item: name,
                price: price
            };
            // Ma'lumotni botga yuborish
            tg.sendData(JSON.stringify(orderData));
            // Oynani yopish
            tg.close();
        }
    </script>
</body>
</html>
